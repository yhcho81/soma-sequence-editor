<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOMA US — Yoga Sequence Template Editor</title>
<style>
  /* ── 공통 ── */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', Arial, sans-serif; background: #f0ede8; color: #2A2A2A; }

  /* ── 에디터 UI ── */
  #editor-ui {
    max-width: 960px;
    margin: 0 auto;
    padding: 72px 20px 60px;   /* 상단 시트 바(44px) 여백 확보 */
  }
  #editor-ui h1 {
    font-size: 22px;
    font-weight: 700;
    color: #7B8C65;
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }
  #editor-ui p.subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 28px;
  }

  .section-card {
    background: #fff;
    border-radius: 12px;
    padding: 20px 22px;
    margin-bottom: 18px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
  }
  .section-card h2 {
    font-size: 15px;
    font-weight: 700;
    color: #7B8C65;
    margin-bottom: 14px;
    border-bottom: 1px solid #E8DBBF;
    padding-bottom: 8px;
  }

  label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 5px; margin-top: 12px; }
  input[type="text"], textarea {
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 8px 10px;
    font-family: 'Malgun Gothic', Arial, sans-serif;
    font-size: 13px;
    color: #2A2A2A;
    resize: vertical;
  }
  input[type="text"]:focus, textarea:focus { outline: 2px solid #7B8C65; border-color: transparent; }

  .flow-block {
    border: 1px solid #E8DBBF;
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 14px;
    background: #fdfcf9;
  }
  .flow-block-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .flow-block-header span {
    font-size: 12px;
    font-weight: 700;
    color: #7B8C65;
    background: #E8DBBF;
    border-radius: 4px;
    padding: 2px 8px;
  }
  .flow-block-header input {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
  }

  .cells-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-top: 10px;
  }
  .cell-editor {
    display: flex;
    flex-direction: column;
    gap: 5px;
    cursor: grab;
    border-radius: 6px;
    transition: opacity 0.15s, box-shadow 0.15s;
  }
  .cell-editor:active { cursor: grabbing; }
  .cell-editor.dragging {
    opacity: 0.35;
  }
  .cell-editor.drag-over {
    box-shadow: -3px 0 0 0 #7B8C65;
    background: #f0f4ec;
    border-radius: 6px;
  }
  .drag-handle {
    font-size: 13px;
    color: #ccc;
    text-align: center;
    letter-spacing: 2px;
    cursor: grab;
    user-select: none;
    margin-bottom: -2px;
  }
  .cell-editor .cell-label { font-size: 11px; color: #999; font-weight: 600; margin: 0; }
  .cell-editor .img-upload {
    width: 100%;
    aspect-ratio: 1;
    border: 1.5px dashed #ccc;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: #f5f3ef;
    overflow: hidden;
    position: relative;
  }
  .cell-editor .img-upload:hover { border-color: #7B8C65; }
  .cell-editor .img-upload img { width: 100%; height: 100%; object-fit: cover; }
  .cell-editor .img-upload .upload-hint { font-size: 10px; color: #bbb; text-align: center; line-height: 1.4; }
  .cell-editor .img-upload input[type="file"] { display: none; }
  .cell-editor textarea {
    font-size: 11px;
    min-height: 52px;
    line-height: 1.5;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  button {
    font-family: 'Malgun Gothic', Arial, sans-serif;
    font-size: 13px;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    padding: 9px 18px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary { background: #7B8C65; color: #fff; }
  .btn-primary:hover { background: #6a7a57; }
  .btn-secondary { background: #E8DBBF; color: #2A2A2A; }
  .btn-secondary:hover { background: #d9cdb2; }
  .btn-danger { background: #f5ebe8; color: #b05040; }
  .btn-danger:hover { background: #ead8d3; }
  .btn-ghost { background: transparent; border: 1.5px solid #E8DBBF; color: #7B8C65; }
  .btn-ghost:hover { background: #f8f5f0; }

  .category-block { margin-bottom: 24px; }
  .category-header-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .category-num {
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    background: #7B8C65;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* 인쇄/프리뷰 버튼 바 */
  #action-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #2A2A2A;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 14px 20px;
    z-index: 100;
  }
  #action-bar button {
    font-size: 14px;
    padding: 10px 24px;
  }

  /* ── 프리뷰 오버레이 ── */
  #preview-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    overflow-y: auto;
    padding: 30px 20px;
  }
  #preview-overlay.active { display: flex; flex-direction: column; align-items: center; }
  #preview-close-btn {
    position: fixed;
    top: 16px;
    right: 24px;
    background: #fff;
    color: #2A2A2A;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    z-index: 201;
  }
  #preview-print-btn {
    position: fixed;
    top: 16px;
    right: 120px;
    background: #7B8C65;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    z-index: 201;
  }

  /* ── A4 프린트 영역 ── */
  .a4-page {
    width: 210mm;
    min-height: 297mm;
    background: #fff;
    padding: 12mm 10mm;
    margin-bottom: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    page-break-after: always;
  }

  /* A4 내부 — 시퀀스 테이블 */
  .seq-doc-title {
    font-size: 16pt;
    font-weight: 700;
    color: #7B8C65;
    text-align: center;
    margin-bottom: 8mm;
    font-family: 'Malgun Gothic', Arial, sans-serif;
    letter-spacing: 0.06em;
  }
  .seq-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Malgun Gothic', Arial, sans-serif;
    font-size: 8pt;
    table-layout: fixed;
  }
  .seq-table td, .seq-table th {
    border: 0.4pt solid #ccc;
    vertical-align: top;
    padding: 0;
  }

  /* 카테고리 헤더 행 */
  .row-category td {
    background: #4a4a4a;
    color: #fff;
    font-size: 10pt;
    font-weight: 700;
    padding: 3mm 4mm;
    text-align: left;
    letter-spacing: 0.04em;
  }

  /* 플로우 타이틀 행 */
  .row-flow-title td {
    background: #E8DBBF;
    color: #2A2A2A;
    font-size: 8pt;
    font-weight: 700;
    padding: 1.5mm 3mm;
  }

  /* 이미지 행 */
  .row-images td {
    height: 38mm;
    padding: 1mm;
  }
  .row-images td img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .row-images td .img-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f3ef;
    color: #ccc;
    font-size: 7pt;
    text-align: center;
  }

  /* 설명 행 */
  .row-desc td {
    padding: 1.5mm 2mm;
    font-size: 7pt;
    color: #333;
    vertical-align: top;
    line-height: 1.5;
    min-height: 12mm;
  }

  /* ── 인쇄 전용 스타일 ── */
  @media print {
    body > *:not(#print-area) { display: none !important; }
    #print-area { display: block !important; }
    #action-bar, #editor-ui, #preview-overlay { display: none !important; }

    /* 배경색·배경이미지 강제 인쇄 */
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    /* 인쇄 시 .a4-page 는 padding 그대로 유지 → 프리뷰와 동일한 레이아웃 */
    .a4-page {
      margin: 0;
      box-shadow: none;
      width: 210mm;         /* A4 고정 너비 */
      min-height: auto;
      page-break-after: always;
    }

    /* 플로우 단위 tbody — 타이틀+이미지+설명 3행이 통째로 붙어다님 */
    .seq-table tbody {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    /* 카테고리 thead — 헤더만 페이지 꼬리에 남지 않도록 */
    .seq-table thead {
      break-after: avoid;
      page-break-after: avoid;
    }

    /* 카테고리 테이블 사이 간격 */
    .seq-table {
      margin-bottom: 4mm;
    }

    /* @page margin 0 → .a4-page padding이 여백 역할 */
    @page {
      size: A4;
      margin: 0;
    }
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     에디터 UI
═══════════════════════════════════════════ -->
<div id="editor-ui">
  <h1>SOMA US — Yoga Sequence Editor</h1>
  <p class="subtitle">A4 프린트용 요가 시퀀스 템플릿 편집기 &nbsp;|&nbsp; 타이틀 / 플로우 / 이미지 / 설명을 입력 후 프리뷰·인쇄하세요.</p>

  <!-- 문서 제목 -->
  <div class="section-card">
    <h2>문서 제목</h2>
    <label>전체 문서 타이틀 (인쇄물 상단)</label>
    <input type="text" id="doc-title" value="SOMA US — Yoga Sequence" placeholder="예: SOMA US — Spring Flow Sequence">
  </div>

  <!-- 카테고리 목록 -->
  <div id="categories-container"></div>

  <div class="btn-row" style="margin-bottom: 80px;">
    <button class="btn-primary" onclick="addCategory()">+ 카테고리 추가</button>
    <button class="btn-ghost" onclick="loadSample()">샘플 데이터 불러오기</button>
  </div>
</div>

<!-- 시트 관리 바 -->
<div id="sheet-bar" style="position:fixed;top:0;left:0;right:0;background:#2A2A2A;color:#E8DBBF;padding:8px 16px;z-index:200;font-size:13px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-height:44px;">
  <span style="font-weight:700;color:#7B8C65;white-space:nowrap;">시퀀스 시트</span>
  <span style="color:#555;">|</span>
  <div id="sheet-tab-list" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;flex:1;"></div>
  <button onclick="addNewSheet()" title="새 시트 추가" style="background:#7B8C65;color:#fff;border:none;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:16px;line-height:1;flex-shrink:0;">+</button>
</div>

<!-- 시트 이름 편집 모달 -->
<div id="sheet-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:500;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:12px;padding:28px 28px 20px;width:340px;box-shadow:0 8px 32px rgba(0,0,0,0.2);">
    <h3 style="font-size:15px;color:#2A2A2A;margin-bottom:16px;" id="sheet-modal-title">새 시트 추가</h3>
    <label style="font-size:12px;color:#888;display:block;margin-bottom:6px;">시트 이름</label>
    <input id="sheet-modal-input" type="text" placeholder="예: 소매틱 이완 요가"
      style="width:100%;border:1px solid #ddd;border-radius:6px;padding:8px 10px;font-size:14px;font-family:inherit;"
      onkeydown="if(event.key==='Enter') confirmSheetModal()">
    <div style="display:flex;gap:8px;margin-top:18px;justify-content:flex-end;">
      <button onclick="closeSheetModal()" style="background:#f0ede8;color:#555;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;">취소</button>
      <button onclick="confirmSheetModal()" style="background:#7B8C65;color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;">확인</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     하단 액션 바
═══════════════════════════════════════════ -->
<div id="action-bar">
  <div style="display:flex;gap:8px;align-items:center;">
    <button class="btn-ghost" onclick="exportJSON()" title="현재 시트 전체를 JSON 파일로 저장">💾 JSON 저장</button>
    <label class="btn-ghost" style="cursor:pointer;margin:0;" title="저장한 JSON 파일 불러오기">
      📂 불러오기
      <input type="file" accept=".json" style="display:none;" onchange="importJSON(event)">
    </label>
    <span id="autosave-indicator" style="font-size:11px;color:#aaa;margin-left:4px;"></span>
  </div>
  <div style="display:flex;gap:8px;">
    <button class="btn-secondary" onclick="showPreview()">🔍 프리뷰 보기</button>
    <button class="btn-primary" onclick="printDoc()">🖨️ 인쇄 / PDF 저장</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     프리뷰 오버레이
═══════════════════════════════════════════ -->
<div id="preview-overlay">
  <button id="preview-close-btn" onclick="closePreview()">✕ 닫기</button>
  <button id="preview-print-btn" onclick="printDoc()">🖨️ 인쇄</button>
  <div id="preview-content"></div>
</div>

<!-- 인쇄 전용 영역 -->
<div id="print-area" style="display:none;"></div>

<!-- kia-sequence-data.js 로드 (없으면 조용히 무시) -->
<script>
  (function() {
    const s = document.createElement('script');
    s.src = 'kia-sequence-data.js';
    s.onload = function() {
      if (typeof KIA_SEQUENCE_DATA !== 'undefined') {
        // KIA 시트 3개를 자동 등록
        const labelMap = {
          '1박2일 40분'    : '40분 세션',
          '1박2일 모닝60분': '모닝 60분',
          '경침테라피'      : '경침 테라피',
        };
        Object.keys(KIA_SEQUENCE_DATA).forEach(key => {
          const fixedId = 'kia_' + key.replace(/\s/g, '_');
          const sheetId = registerSheet(labelMap[key] || key, () => loadKiaSheet(key), fixedId);
          // sheetStore에 없으면(첫 방문) 즉시 로드해서 저장
          if (!sheetStore[fixedId]) {
            loadKiaSheet(key);
            sheetStore[fixedId] = {
              title: labelMap[key] || key,
              cats: JSON.parse(JSON.stringify(categories)),
              catIdCounter, flowIdCounter
            };
          }
        });
        renderSheetBar();
      }
    };
    document.head.appendChild(s);
  })();
</script>

<script>
// ─────────────────────────────────────────────
// 데이터 모델
// ─────────────────────────────────────────────
let categories = [];
let catIdCounter = 0;
let flowIdCounter = 0;

// 이미지 저장소 (id → dataURL)
const imgStore = {};

function makeCell() {
  return { imgId: null, desc: '' };
}

function makeFlow(catId) {
  flowIdCounter++;
  return {
    id: `f${flowIdCounter}`,
    catId,
    title: '',
    cells: [makeCell(), makeCell(), makeCell(), makeCell(), makeCell()]
  };
}

function addCategory() {
  catIdCounter++;
  const cat = {
    id: `c${catIdCounter}`,
    title: `카테고리 ${catIdCounter}`,
    flows: []
  };
  categories.push(cat);
  cat.flows.push(makeFlow(cat.id));
  renderEditor();
}

function removeCategory(catId) {
  categories = categories.filter(c => c.id !== catId);
  renderEditor();
}

function addFlow(catId) {
  const cat = categories.find(c => c.id === catId);
  if (cat) {
    cat.flows.push(makeFlow(cat.id));
    renderEditor();
  }
}

function removeFlow(catId, flowId) {
  const cat = categories.find(c => c.id === catId);
  if (cat) {
    cat.flows = cat.flows.filter(f => f.id !== flowId);
    renderEditor();
  }
}

// 셀 5개 추가 (한 행 추가)
function addCells(catId, flowId) {
  const flow = getFlow(catId, flowId);
  if (!flow) return;
  for (let i = 0; i < 5; i++) flow.cells.push(makeCell());
  renderEditor();
}

// 셀 5개 제거 (마지막 행 제거, 최소 5개 유지)
function removeCells(catId, flowId) {
  const flow = getFlow(catId, flowId);
  if (!flow || flow.cells.length <= 5) return;
  flow.cells.splice(flow.cells.length - 5, 5);
  renderEditor();
}

// ─────────────────────────────────────────────
// 에디터 렌더링
// ─────────────────────────────────────────────
function renderEditor() {
  scheduleAutosave();
  const container = document.getElementById('categories-container');
  container.innerHTML = '';

  categories.forEach((cat, ci) => {
    const catDiv = document.createElement('div');
    catDiv.className = 'section-card category-block';
    catDiv.innerHTML = `
      <div class="category-header-row">
        <div class="category-num">${ci + 1}</div>
        <h2 style="border:none;padding:0;margin:0;flex:1;">카테고리</h2>
        <button class="btn-danger" style="padding:5px 12px;font-size:12px;" onclick="removeCategory('${cat.id}')">삭제</button>
      </div>
      <label>카테고리 타이틀 (회색 헤더 행)</label>
      <input type="text" value="${esc(cat.title)}" placeholder="예: Warm Up / Core Flow / Cool Down"
        oninput="categories.find(c=>c.id==='${cat.id}').title=this.value">
      <div id="flows-${cat.id}" style="margin-top:14px;"></div>
      <div class="btn-row" style="margin-top:10px;">
        <button class="btn-secondary" onclick="addFlow('${cat.id}')">+ 플로우 추가</button>
      </div>
    `;
    container.appendChild(catDiv);

    const flowsDiv = catDiv.querySelector(`#flows-${cat.id}`);
    cat.flows.forEach((flow, fi) => {
      const rowCount = Math.ceil(flow.cells.length / 5);
      const canRemove = flow.cells.length > 5;

      const flowDiv = document.createElement('div');
      flowDiv.className = 'flow-block';
      flowDiv.innerHTML = `
        <div class="flow-block-header">
          <span>FLOW ${fi + 1}</span>
          <input type="text" value="${esc(flow.title)}" placeholder="플로우 타이틀 (예: Sun Salutation A)"
            oninput="getFlow('${cat.id}','${flow.id}').title=this.value">
          <button class="btn-danger" style="padding:4px 10px;font-size:11px;" onclick="removeFlow('${cat.id}','${flow.id}')">삭제</button>
        </div>
        <div style="font-size:11px;color:#999;margin-bottom:8px;">
          현재 <strong>${flow.cells.length}칸</strong> (${rowCount}행 × 5열)
        </div>
        <div id="cells-${flow.id}"></div>
        <div class="btn-row" style="margin-top:8px;">
          <button class="btn-ghost" style="font-size:11px;padding:5px 12px;"
            onclick="addCells('${cat.id}','${flow.id}')">+ 5칸 추가 (1행)</button>
          <button class="btn-ghost" style="font-size:11px;padding:5px 12px;${canRemove ? '' : 'opacity:0.35;pointer-events:none;'}"
            onclick="removeCells('${cat.id}','${flow.id}')">- 5칸 제거 (마지막 행)</button>
        </div>
      `;
      flowsDiv.appendChild(flowDiv);

      const cellsContainer = flowDiv.querySelector(`#cells-${flow.id}`);

      // 5개씩 행으로 나눠 렌더링
      for (let row = 0; row < rowCount; row++) {
        const rowDiv = document.createElement('div');
        rowDiv.style.cssText = 'margin-bottom:10px;';

        if (rowCount > 1) {
          const rowLabel = document.createElement('div');
          rowLabel.style.cssText = 'font-size:10px;font-weight:700;color:#aaa;margin-bottom:5px;letter-spacing:0.04em;';
          rowLabel.textContent = `ROW ${row + 1}`;
          rowDiv.appendChild(rowLabel);
        }

        const grid = document.createElement('div');
        grid.className = 'cells-grid';

        for (let col = 0; col < 5; col++) {
          const ci2 = row * 5 + col;
          if (ci2 >= flow.cells.length) break;
          const cell = flow.cells[ci2];
          const cellDiv = document.createElement('div');
          cellDiv.className = 'cell-editor';
          cellDiv.draggable = true;
          cellDiv.setAttribute('data-cat-id',   cat.id);
          cellDiv.setAttribute('data-flow-id',  flow.id);
          cellDiv.setAttribute('data-cell-idx', ci2);
          const imgSrc = cell.imgId && imgStore[cell.imgId] ? imgStore[cell.imgId] : null;
          cellDiv.innerHTML = `
            <div class="drag-handle" title="드래그하여 순서 변경">⠿⠿</div>
            <span class="cell-label">${ci2 + 1}번</span>
            <div class="img-upload" onclick="triggerImgUpload('${flow.id}',${ci2})">
              ${imgSrc
                ? `<img src="${imgSrc}" alt="">`
                : `<div class="upload-hint">클릭 또는<br>드래그 & 드롭</div>`
              }
              <input type="file" accept="image/*" onchange="handleImgUpload(this,'${flow.id}',${ci2})">
            </div>
            <textarea placeholder="동작 설명"
              oninput="getFlow('${cat.id}','${flow.id}').cells[${ci2}].desc=this.value">${esc(cell.desc)}</textarea>
          `;
          attachCellDrag(cellDiv);
          grid.appendChild(cellDiv);
        }

        rowDiv.appendChild(grid);
        cellsContainer.appendChild(rowDiv);
      }
    });
  });
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

// ─────────────────────────────────────────────
// 셀 드래그 앤 드롭 (같은 flow 안에서 순서 변경)
// ─────────────────────────────────────────────
let dragSrc = null;  // { catId, flowId, cellIdx }

function attachCellDrag(el) {
  el.addEventListener('dragstart', (e) => {
    dragSrc = {
      catId:   el.getAttribute('data-cat-id'),
      flowId:  el.getAttribute('data-flow-id'),
      cellIdx: parseInt(el.getAttribute('data-cell-idx')),
    };
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    // textarea 드래그 방지
    e.dataTransfer.setData('text/plain', '');
  });

  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    document.querySelectorAll('.cell-editor.drag-over').forEach(d => d.classList.remove('drag-over'));
    dragSrc = null;
  });

  el.addEventListener('dragover', (e) => {
    e.preventDefault();
    if (!dragSrc) return;
    if (el.getAttribute('data-flow-id') !== dragSrc.flowId) return;
    if (parseInt(el.getAttribute('data-cell-idx')) === dragSrc.cellIdx) return;
    document.querySelectorAll('.cell-editor.drag-over').forEach(d => d.classList.remove('drag-over'));
    el.classList.add('drag-over');
    e.dataTransfer.dropEffect = 'move';
  });

  el.addEventListener('dragleave', () => {
    el.classList.remove('drag-over');
  });

  el.addEventListener('drop', (e) => {
    e.preventDefault();
    el.classList.remove('drag-over');
    if (!dragSrc) return;
    const targetIdx = parseInt(el.getAttribute('data-cell-idx'));
    const srcIdx    = dragSrc.cellIdx;
    if (el.getAttribute('data-flow-id') !== dragSrc.flowId) return;
    if (targetIdx === srcIdx) return;

    const flow = getFlow(dragSrc.catId, dragSrc.flowId);
    if (!flow) return;

    // 배열에서 srcIdx 꺼내 targetIdx 위치에 삽입
    const [moved] = flow.cells.splice(srcIdx, 1);
    flow.cells.splice(targetIdx, 0, moved);

    renderEditor();
  });

  // textarea, 이미지 영역 클릭 시 드래그 시작 방지
  el.querySelector('textarea')?.addEventListener('mousedown', (e) => e.stopPropagation());

  // 이미지 영역 — 클릭 드래그 방지 + 파일 드롭 업로드
  const imgUpload = el.querySelector('.img-upload');
  if (imgUpload) {
    imgUpload.addEventListener('mousedown', (e) => e.stopPropagation());

    imgUpload.addEventListener('dragover', (e) => {
      // 파일 드롭인 경우만 허용 (셀 재정렬 드래그와 구분)
      if (e.dataTransfer.types.includes('Files')) {
        e.preventDefault();
        e.stopPropagation();
        imgUpload.style.borderColor = '#7B8C65';
        imgUpload.style.background  = '#f0f4ec';
      }
    });

    imgUpload.addEventListener('dragleave', (e) => {
      e.stopPropagation();
      imgUpload.style.borderColor = '';
      imgUpload.style.background  = '';
    });

    imgUpload.addEventListener('drop', (e) => {
      e.preventDefault();
      e.stopPropagation();
      imgUpload.style.borderColor = '';
      imgUpload.style.background  = '';

      const file = e.dataTransfer.files[0];
      if (!file || !file.type.startsWith('image/')) return;

      const flowId  = el.getAttribute('data-flow-id');
      const cellIdx = parseInt(el.getAttribute('data-cell-idx'));
      const fakeInput = { files: [file] };
      handleImgUpload(fakeInput, flowId, cellIdx);
    });
  }
}

function getFlow(catId, flowId) {
  const cat = categories.find(c => c.id === catId);
  return cat ? cat.flows.find(f => f.id === flowId) : null;
}

function triggerImgUpload(flowId, cellIdx) {
  const cellDiv = document.querySelector(
    `.cell-editor[data-flow-id="${flowId}"][data-cell-idx="${cellIdx}"]`
  );
  if (!cellDiv) return;
  cellDiv.querySelector('input[type="file"]').click();
}

function handleImgUpload(input, flowId, cellIdx) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const dataURL = e.target.result;
    // 고유 ID 생성 (타임스탬프 + 랜덤)
    const imgId = `img_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
    imgStore[imgId] = dataURL;
    for (const cat of categories) {
      const flow = cat.flows.find(f => f.id === flowId);
      if (flow && flow.cells[cellIdx]) {
        // 기존 imgId 가 있으면 imgStore에서 제거 (메모리 절약)
        const oldId = flow.cells[cellIdx].imgId;
        if (oldId && oldId !== imgId) delete imgStore[oldId];
        flow.cells[cellIdx].imgId = imgId;
        break;
      }
    }
    renderEditor();
  };
  reader.readAsDataURL(file);
}

// ─────────────────────────────────────────────
// A4 HTML 생성
// 카테고리별로 테이블 분리 → <thead>가 페이지마다 반복됨
// ─────────────────────────────────────────────
function buildA4HTML() {
  const docTitle = document.getElementById('doc-title').value || 'SOMA US — Yoga Sequence';

  if (!categories.length || categories.every(c => !c.flows.length)) {
    return `<div class="a4-page">
      <div class="seq-doc-title">${escHtml(docTitle)}</div>
      <p style="text-align:center;color:#ccc;font-size:9pt;margin-top:20mm;">카테고리와 플로우를 추가하세요.</p>
    </div>`;
  }

  const colgroup = `<colgroup>
    <col style="width:20%"><col style="width:20%"><col style="width:20%">
    <col style="width:20%"><col style="width:20%">
  </colgroup>`;

  let html = `<div class="a4-page">
    <div class="seq-doc-title">${escHtml(docTitle)}</div>`;

  for (const cat of categories) {
    if (!cat.flows.length) continue;

    // 카테고리 단위로 테이블 생성
    // <thead> 안의 카테고리 헤더 행은 페이지 넘김 시 자동 반복됨
    html += `
    <table class="seq-table" style="margin-bottom:4mm;">
      ${colgroup}
      <thead>
        <tr class="row-category">
          <td colspan="5">${escHtml(cat.title || '(카테고리 없음)')}</td>
        </tr>
      </thead>`;

    // 플로우마다 독립된 <tbody> → break-inside:avoid 가 플로우 단위로 적용됨
    for (const flow of cat.flows) {
      const rowCount = Math.ceil(flow.cells.length / 5);

      for (let row = 0; row < rowCount; row++) {
        html += `<tbody>`;

        // 플로우 타이틀
        if (row === 0) {
          html += `
          <tr class="row-flow-title">
            <td colspan="5">${escHtml(flow.title || '(플로우 타이틀)')}</td>
          </tr>`;
        } else {
          html += `
          <tr class="row-flow-title" style="background:#f3f0ea;">
            <td colspan="5" style="color:#999;font-size:6.5pt;padding:1mm 3mm;font-style:italic;">
              ↳ ${escHtml(flow.title || '')} 계속
            </td>
          </tr>`;
        }

        // 이미지 행
        html += `<tr class="row-images">`;
        for (let col = 0; col < 5; col++) {
          const idx = row * 5 + col;
          const cell = flow.cells[idx];
          if (!cell) { html += `<td style="background:#fafafa;"></td>`; continue; }
          const imgSrc = cell.imgId && imgStore[cell.imgId];
          html += imgSrc
            ? `<td><img src="${imgSrc}" alt=""></td>`
            : `<td><div class="img-placeholder">이미지</div></td>`;
        }
        html += `</tr>`;

        // 설명 행
        html += `<tr class="row-desc">`;
        for (let col = 0; col < 5; col++) {
          const idx = row * 5 + col;
          const cell = flow.cells[idx];
          html += `<td>${cell ? escHtml(cell.desc || '') : ''}</td>`;
        }
        html += `</tr>`;

        html += `</tbody>`;
      }
    }

    html += `</table>`;
  }

  html += `</div>`;
  return html;
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 저장 / 불러오기
// ─────────────────────────────────────────────
const LS_KEY = 'soma-sequence-editor-v1';
let autosaveTimer = null;

// 현재 활성 시트 상태를 객체로 반환
function getCurrentSheetData() {
  return {
    title: document.getElementById('doc-title').value,
    categories: JSON.parse(JSON.stringify(categories))
  };
}

// 전체 세션(모든 시트) 저장 데이터 구성
function buildSavePayload() {
  // 현재 시트 먼저 store에 반영
  if (activeSheetId) {
    sheetStore[activeSheetId] = {
      title: document.getElementById('doc-title').value,
      cats: JSON.parse(JSON.stringify(categories)),
      catIdCounter,
      flowIdCounter,
    };
  }
  return {
    version: 1,
    savedAt: new Date().toISOString(),
    activeSheetId,
    sheetList: sheetList.map(s => ({ id: s.id, label: s.label })),
    sheetStore,
    catIdCounter,
    flowIdCounter,
  };
}

// localStorage 자동저장 (편집 후 2초 뒤)
function scheduleAutosave() {
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(() => {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify(buildSavePayload()));
      const el = document.getElementById('autosave-indicator');
      if (el) {
        el.textContent = '자동저장 완료 ' + new Date().toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'});
        clearTimeout(el._timer);
        el._timer = setTimeout(() => { el.textContent = ''; }, 3000);
      }
    } catch(e) {}
  }, 2000);
}

// JSON 파일로 내보내기 (현재 시트만)
function exportJSON() {
  const data = getCurrentSheetData();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const safeName = (data.title || 'sequence').replace(/[\\/:*?"<>|]/g, '_').slice(0, 60);
  a.download = `${safeName}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

// JSON 파일 불러오기
function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      // 단일 시트 형식 { title, categories }
      const title = data.title || file.name.replace('.json','');
      const cats  = data.categories || [];
      // 새 시트로 등록
      const label = title.slice(0, 30);
      registerSheet(label, () => {
        document.getElementById('doc-title').value = title;
        categories = cats;
        // id 충돌 방지: 모든 cat/flow id 재발급
        catIdCounter += cats.length;
        cats.forEach(c => { flowIdCounter += c.flows.length; });
        renderEditor();
      });
      const newSh = sheetList[sheetList.length - 1];
      switchSheet(newSh.id);
    } catch(err) {
      alert('JSON 파싱 오류: ' + err.message);
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// localStorage 복원
function restoreFromLocalStorage() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return false;
    const payload = JSON.parse(raw);
    if (!payload.version || !payload.sheetList) return false;

    // 시트 목록 복원 (KIA 외 커스텀 시트)
    catIdCounter  = payload.catIdCounter  || 0;
    flowIdCounter = payload.flowIdCounter || 0;
    Object.assign(sheetStore, payload.sheetStore || {});

    // 중복 ID 제거 (같은 id가 여러 번 있으면 첫 번째만 유지)
    const seenIds = new Set();
    const dedupedList = (payload.sheetList || []).filter(s => {
      if (seenIds.has(s.id)) return false;
      seenIds.add(s.id);
      return true;
    });

    dedupedList.forEach(s => {
      // sheetStore에 저장된 데이터가 있으면 복원 (KIA 포함)
      if (sheetStore[s.id]) {
        sheetList.push({ id: s.id, label: s.label, loader: () => {
          const saved = sheetStore[s.id];
          categories = saved.cats || [];
          catIdCounter = saved.catIdCounter || catIdCounter;
          flowIdCounter = saved.flowIdCounter || flowIdCounter;
          document.getElementById('doc-title').value = saved.title || s.label;
          renderEditor();
        }});
      }
    });

    if (payload.activeSheetId && sheetStore[payload.activeSheetId]) {
      activeSheetId = null;
      const target = sheetList.find(s => s.id === payload.activeSheetId);
      if (target) {
        switchSheet(target.id);
        return true;
      }
    }
    return sheetList.length > 0;
  } catch(e) {
    return false;
  }
}

// ─────────────────────────────────────────────
// 시트 관리 시스템
// ─────────────────────────────────────────────
let sheetList = [];          // [{id, label, loader}]  loader = function()
let activeSheetId = null;
let sheetCounter = 0;

// 시트 저장소: sheetId → {title, cats}
const sheetStore = {};

function registerSheet(label, loader, fixedId) {
  const id = fixedId || (() => { sheetCounter++; return `sh${sheetCounter}`; })();
  // 이미 같은 ID가 있으면 중복 등록 방지
  if (sheetList.find(s => s.id === id)) return id;
  sheetList.push({ id, label, loader });
  renderSheetBar();
  return id;
}

function renderSheetBar() {
  const list = document.getElementById('sheet-tab-list');
  list.innerHTML = '';
  sheetList.forEach(sh => {
    const isActive = sh.id === activeSheetId;
    const wrap = document.createElement('div');
    wrap.style.cssText = `display:inline-flex;align-items:center;background:${isActive ? '#7B8C65' : '#3a3a3a'};border-radius:6px;overflow:hidden;`;

    const btn = document.createElement('button');
    btn.textContent = sh.label;
    btn.title = sh.label;
    btn.style.cssText = `background:transparent;color:${isActive ? '#fff' : '#ccc'};border:none;padding:5px 12px;cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap;`;
    btn.onclick = () => switchSheet(sh.id);

    const renameBtn = document.createElement('button');
    renameBtn.textContent = '✎';
    renameBtn.title = '이름 변경';
    renameBtn.style.cssText = `background:transparent;color:${isActive ? '#ddd' : '#666'};border:none;padding:5px 4px 5px 0;cursor:pointer;font-size:11px;`;
    renameBtn.onclick = (e) => { e.stopPropagation(); openRenameSheet(sh.id); };

    const delBtn = document.createElement('button');
    delBtn.textContent = '×';
    delBtn.title = '시트 삭제';
    delBtn.style.cssText = `background:transparent;color:${isActive ? '#fbb' : '#777'};border:none;padding:5px 8px 5px 2px;cursor:pointer;font-size:14px;font-weight:700;`;
    delBtn.onclick = (e) => { e.stopPropagation(); deleteSheet(sh.id); };

    wrap.appendChild(btn);
    wrap.appendChild(renameBtn);
    wrap.appendChild(delBtn);
    list.appendChild(wrap);
  });
}

function switchSheet(sheetId) {
  // 현재 상태 저장
  if (activeSheetId) {
    sheetStore[activeSheetId] = {
      title: document.getElementById('doc-title').value,
      cats: JSON.parse(JSON.stringify(categories)),
      catIdCounter,
      flowIdCounter,
    };
  }

  activeSheetId = sheetId;
  const sh = sheetList.find(s => s.id === sheetId);
  if (!sh) return;

  // 저장된 상태가 있으면 복원, 없으면 loader 실행
  if (sheetStore[sheetId]) {
    const saved = sheetStore[sheetId];
    categories = saved.cats;
    catIdCounter = saved.catIdCounter;
    flowIdCounter = saved.flowIdCounter;
    document.getElementById('doc-title').value = saved.title;
    renderEditor();
  } else {
    sh.loader();
  }

  renderSheetBar();
}

function deleteSheet(sheetId) {
  if (sheetList.length <= 1) { alert('마지막 시트는 삭제할 수 없습니다.'); return; }
  if (!confirm(`"${sheetList.find(s=>s.id===sheetId)?.label}" 시트를 삭제할까요?`)) return;

  const idx = sheetList.findIndex(s => s.id === sheetId);
  sheetList.splice(idx, 1);
  delete sheetStore[sheetId];

  if (activeSheetId === sheetId) {
    activeSheetId = null;
    const next = sheetList[Math.min(idx, sheetList.length - 1)];
    if (next) switchSheet(next.id);
  }
  renderSheetBar();
}

// 새 빈 시트 추가
let modalMode = 'add';   // 'add' | 'rename'
let renameTargetId = null;

function addNewSheet() {
  modalMode = 'add';
  document.getElementById('sheet-modal-title').textContent = '새 시트 추가';
  document.getElementById('sheet-modal-input').value = '';
  document.getElementById('sheet-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('sheet-modal-input').focus(), 50);
}

function openRenameSheet(sheetId) {
  modalMode = 'rename';
  renameTargetId = sheetId;
  const sh = sheetList.find(s => s.id === sheetId);
  document.getElementById('sheet-modal-title').textContent = '시트 이름 변경';
  document.getElementById('sheet-modal-input').value = sh?.label || '';
  document.getElementById('sheet-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('sheet-modal-input').select(), 50);
}

function closeSheetModal() {
  document.getElementById('sheet-modal').style.display = 'none';
}

function confirmSheetModal() {
  const name = document.getElementById('sheet-modal-input').value.trim();
  if (!name) return;
  closeSheetModal();

  if (modalMode === 'rename') {
    const sh = sheetList.find(s => s.id === renameTargetId);
    if (sh) sh.label = name;
    // 저장된 타이틀도 업데이트
    if (sheetStore[renameTargetId]) sheetStore[renameTargetId].title = name;
    if (activeSheetId === renameTargetId) document.getElementById('doc-title').value = name;
    renderSheetBar();
  } else {
    // 빈 시트 생성
    registerSheet(name, () => {
      catIdCounter = 0; flowIdCounter = 0; categories = [];
      document.getElementById('doc-title').value = name;
      addCategory();
    });
    // 마지막 시트로 전환
    const newSh = sheetList[sheetList.length - 1];
    switchSheet(newSh.id);
  }
}

// ─────────────────────────────────────────────
// KIA 시퀀스 데이터 로드
// ─────────────────────────────────────────────
function loadKiaSheet(sheetName) {
  if (typeof KIA_SEQUENCE_DATA === 'undefined') {
    alert('kia-sequence-data.js 파일이 로드되지 않았습니다.');
    return;
  }
  const sheetData = KIA_SEQUENCE_DATA[sheetName];
  if (!sheetData) {
    alert(`시트 "${sheetName}" 를 찾을 수 없습니다.`);
    return;
  }

  catIdCounter = 0;
  flowIdCounter = 0;
  categories = [];

  for (const kiacat of sheetData.categories) {
    catIdCounter++;
    const cat = { id: `c${catIdCounter}`, title: kiacat.title, flows: [] };

    for (const kiaflow of kiacat.flows) {
      flowIdCounter++;
      const cells = kiaflow.cells.map(c => ({ imgId: null, desc: c.desc || '' }));
      cat.flows.push({ id: `f${flowIdCounter}`, catId: cat.id, title: kiaflow.title, cells });
    }

    // 플로우가 없는 카테고리도 빈 플로우 하나 추가
    if (cat.flows.length === 0) {
      flowIdCounter++;
      cat.flows.push({ id: `f${flowIdCounter}`, catId: cat.id, title: kiacat.title, cells: [{imgId:null,desc:''},{imgId:null,desc:''},{imgId:null,desc:''},{imgId:null,desc:''},{imgId:null,desc:''}] });
    }

    categories.push(cat);
  }

  document.getElementById('doc-title').value = sheetData.title;
  renderEditor();
}

// ─────────────────────────────────────────────
// 초기화
// ─────────────────────────────────────────────
// 모달 바깥 클릭 시 닫기
document.getElementById('sheet-modal').addEventListener('click', function(e) {
  if (e.target === this) closeSheetModal();
});

window.addEventListener('DOMContentLoaded', () => {
  // localStorage 복원 시도
  const restored = restoreFromLocalStorage();

  if (!restored) {
    // 복원 실패 → 샘플 시트로 시작
    registerSheet('샘플 시퀀스', () => {
      loadSample();
      document.getElementById('doc-title').value = 'SOMA US — Spring Yoga Sequence';
    });
    switchSheet(sheetList[0].id);
  } else {
    renderSheetBar();
  }

  // doc-title 변경 시에도 자동저장
  document.getElementById('doc-title').addEventListener('input', scheduleAutosave);
});
</script>
