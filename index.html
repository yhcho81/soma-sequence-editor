<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOMA US — Yoga Sequence Template Editor</title>
<style>
  /* ── 공통 ── */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', Arial, sans-serif; background: #f0ede8; color: #2A2A2A; }

  /* ── 에디터 UI ── */
  #editor-ui {
    max-width: 960px;
    margin: 0 auto;
    padding: 72px 20px 60px;   /* 상단 시트 바(44px) 여백 확보 */
  }
  #editor-ui h1 {
    font-size: 22px;
    font-weight: 700;
    color: #7B8C65;
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }
  #editor-ui p.subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 28px;
  }

  .section-card {
    background: #fff;
    border-radius: 12px;
    padding: 20px 22px;
    margin-bottom: 18px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
  }
  .section-card h2 {
    font-size: 15px;
    font-weight: 700;
    color: #7B8C65;
    margin-bottom: 14px;
    border-bottom: 1px solid #E8DBBF;
    padding-bottom: 8px;
  }

  label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 5px; margin-top: 12px; }
  input[type="text"], textarea {
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 8px 10px;
    font-family: 'Malgun Gothic', Arial, sans-serif;
    font-size: 13px;
    color: #2A2A2A;
    resize: vertical;
  }
  input[type="text"]:focus, textarea:focus { outline: 2px solid #7B8C65; border-color: transparent; }

  .flow-block {
    border: 1px solid #E8DBBF;
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 14px;
    background: #fdfcf9;
  }
  .flow-block-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .flow-block-header span {
    font-size: 12px;
    font-weight: 700;
    color: #7B8C65;
    background: #E8DBBF;
    border-radius: 4px;
    padding: 2px 8px;
  }
  .flow-block-header input {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
  }

  .cells-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-top: 10px;
  }
  .cell-editor {
    display: flex;
    flex-direction: column;
    gap: 5px;
    cursor: grab;
    border-radius: 6px;
    transition: opacity 0.15s, box-shadow 0.15s;
  }
  .cell-editor:active { cursor: grabbing; }
  .cell-editor.dragging {
    opacity: 0.35;
  }
  .cell-editor.drag-over {
    box-shadow: -3px 0 0 0 #7B8C65;
    background: #f0f4ec;
    border-radius: 6px;
  }
  .drag-handle {
    font-size: 13px;
    color: #ccc;
    text-align: center;
    letter-spacing: 2px;
    cursor: grab;
    user-select: none;
    margin-bottom: -2px;
  }
  .cell-editor .cell-label { font-size: 11px; color: #999; font-weight: 600; margin: 0; }
  .cell-editor .img-upload {
    width: 100%;
    aspect-ratio: 1;
    border: 1.5px dashed #ccc;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: #f5f3ef;
    overflow: hidden;
    position: relative;
  }
  .cell-editor .img-upload:hover { border-color: #7B8C65; }
  .cell-editor .img-upload img { width: 100%; height: 100%; object-fit: cover; }
  .cell-editor .img-upload .upload-hint { font-size: 10px; color: #bbb; text-align: center; line-height: 1.4; }
  .cell-editor .img-upload input[type="file"] { display: none; }
  .cell-editor textarea {
    font-size: 11px;
    min-height: 52px;
    line-height: 1.5;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  button {
    font-family: 'Malgun Gothic', Arial, sans-serif;
    font-size: 13px;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    padding: 9px 18px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary { background: #7B8C65; color: #fff; }
  .btn-primary:hover { background: #6a7a57; }
  .btn-secondary { background: #E8DBBF; color: #2A2A2A; }
  .btn-secondary:hover { background: #d9cdb2; }
  .btn-danger { background: #f5ebe8; color: #b05040; }
  .btn-danger:hover { background: #ead8d3; }
  .btn-ghost { background: transparent; border: 1.5px solid #E8DBBF; color: #7B8C65; }
  .btn-ghost:hover { background: #f8f5f0; }

  .category-block { margin-bottom: 24px; }
  .category-header-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .category-num {
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    background: #7B8C65;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* 인쇄/프리뷰 버튼 바 */
  #action-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #2A2A2A;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
    padding: 10px 20px;
    z-index: 100;
  }
  #action-bar button {
    font-size: 14px;
    padding: 10px 24px;
  }

  /* ── 프리뷰 오버레이 ── */
  #preview-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    overflow-y: auto;
    padding: 30px 20px;
  }
  #preview-overlay.active { display: flex; flex-direction: column; align-items: center; }
  #preview-close-btn {
    position: fixed;
    top: 16px;
    right: 24px;
    background: #fff;
    color: #2A2A2A;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    z-index: 201;
  }
  #preview-print-btn {
    position: fixed;
    top: 16px;
    right: 120px;
    background: #7B8C65;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    z-index: 201;
  }

  /* ── A4 프린트 영역 ── */
  .a4-page {
    width: 210mm;
    min-height: 297mm;
    background: #fff;
    padding: 12mm 10mm;
    margin-bottom: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    page-break-after: always;
  }

  /* A4 내부 — 시퀀스 테이블 */
  .seq-doc-title {
    font-size: 16pt;
    font-weight: 700;
    color: #7B8C65;
    text-align: center;
    margin-bottom: 8mm;
    font-family: 'Malgun Gothic', Arial, sans-serif;
    letter-spacing: 0.06em;
  }
  .seq-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Malgun Gothic', Arial, sans-serif;
    font-size: 8pt;
    table-layout: fixed;
  }
  .seq-table td, .seq-table th {
    border: 0.4pt solid #ccc;
    vertical-align: top;
    padding: 0;
  }

  /* 카테고리 헤더 행 */
  .row-category td {
    background: #4a4a4a;
    color: #fff;
    font-size: 10pt;
    font-weight: 700;
    padding: 3mm 4mm;
    text-align: left;
    letter-spacing: 0.04em;
  }

  /* 플로우 타이틀 행 */
  .row-flow-title td {
    background: #E8DBBF;
    color: #2A2A2A;
    font-size: 8pt;
    font-weight: 700;
    padding: 1.5mm 3mm;
  }

  /* 이미지 행 */
  .row-images td {
    height: 38mm;
    padding: 1mm;
  }
  .row-images td img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .row-images td .img-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f3ef;
    color: #ccc;
    font-size: 7pt;
    text-align: center;
  }

  /* 설명 행 */
  .row-desc td {
    padding: 1.5mm 2mm;
    font-size: 7pt;
    color: #333;
    vertical-align: top;
    line-height: 1.5;
    min-height: 12mm;
  }

  /* ── 인쇄 전용 스타일 ── */
  @media print {
    body > *:not(#print-area) { display: none !important; }
    #print-area { display: block !important; }
    #action-bar, #editor-ui, #preview-overlay { display: none !important; }

    /* 배경색·배경이미지 강제 인쇄 */
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    /* 인쇄 시 .a4-page 는 padding 그대로 유지 → 프리뷰와 동일한 레이아웃 */
    .a4-page {
      margin: 0;
      box-shadow: none;
      width: 210mm;         /* A4 고정 너비 */
      min-height: auto;
      page-break-after: always;
    }

    /* 플로우 단위 tbody — 타이틀+이미지+설명 3행이 통째로 붙어다님 */
    .seq-table tbody {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    /* 카테고리 thead — 헤더만 페이지 꼬리에 남지 않도록 */
    .seq-table thead {
      break-after: avoid;
      page-break-after: avoid;
    }

    /* 카테고리 테이블 사이 간격 */
    .seq-table {
      margin-bottom: 4mm;
    }

    /* @page margin 0 → .a4-page padding이 여백 역할 */
    @page {
      size: A4;
      margin: 0;
    }
  }

  /* ── 모바일 반응형 디자인 (max-width: 600px) ── */
  @media (max-width: 600px) {
    /* 에디터 UI 여백 축소 */
    #editor-ui {
      padding: 72px 12px 60px;
    }

    /* 섹션 카드 패딩 축소 */
    .section-card {
      padding: 16px 14px;
      margin-bottom: 12px;
    }

    /* 포즈 카드 그리드: 5열 → 2열 또는 3열 */
    .cells-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }

    /* 셀 에디터 텍스트 크기 축소 */
    .cell-editor .cell-label {
      font-size: 10px;
    }

    .cell-editor textarea {
      font-size: 10px;
      min-height: 40px;
    }

    /* 상단 버튼 바 (시트 탭): 줄바꿈 & 스크롤 처리 */
    #sheet-bar {
      flex-wrap: wrap;
      min-height: auto;
      padding: 6px 8px;
    }

    #sheet-tab-list {
      flex-wrap: wrap;
      max-width: 100%;
    }

    /* 플로우 블록 패딩 축소 */
    .flow-block {
      padding: 10px;
      margin-bottom: 10px;
    }

    .flow-block-header {
      gap: 6px;
      margin-bottom: 8px;
    }

    .flow-block-header span {
      font-size: 11px;
      padding: 1px 6px;
    }

    .flow-block-header input {
      font-size: 12px;
    }

    /* 버튼 바 줄바꿈 */
    .btn-row {
      gap: 6px;
    }

    button {
      padding: 7px 12px;
      font-size: 12px;
    }

    /* 모달: 최대 너비 조정 & 좌우 패딩 */
    #sheet-modal > div {
      width: 90vw;
      max-width: 300px;
      padding: 20px 16px 14px;
    }

    #cloud-modal > div {
      width: 90vw;
      max-width: 380px;
      padding: 20px 16px 14px;
    }

    /* 프리뷰 오버레이 패딩 */
    #preview-overlay {
      padding: 16px 10px;
    }

    #preview-close-btn,
    #preview-print-btn {
      top: 8px;
      padding: 6px 12px;
      font-size: 12px;
    }

    #preview-print-btn {
      right: 70px;
    }

    /* A4 페이지 프리뷰 축소 */
    .a4-page {
      width: 95vw;
      max-width: 500px;
      padding: 8mm 6mm;
      margin-bottom: 10px;
    }

    .seq-doc-title {
      font-size: 14pt;
      margin-bottom: 6mm;
    }

    .seq-table {
      font-size: 7pt;
    }

    .seq-table td, .seq-table th {
      padding: 0;
    }

    .row-images td {
      height: 30mm;
    }

    .row-desc td {
      font-size: 6pt;
      min-height: 10mm;
    }
  }
</style>
<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
  import { getFirestore, collection, addDoc, getDocs, getDoc, deleteDoc, doc, updateDoc, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js';
  import { getStorage, ref, uploadString, getDownloadURL, deleteObject }
    from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-storage.js';

  // ⚠️ 보안 주의: Firebase API Key가 소스 코드에 포함되어 있습니다.
  // 단일 HTML 파일 구조 특성상 완전한 은닉은 불가합니다.
  // Firebase Console에서 HTTP Referrer 도메인 제한을 반드시 설정하세요.
  // 설정 경로: Firebase Console → 프로젝트 설정 → API 키 → 애플리케이션 제한 → HTTP 리퍼러
  // 허용 도메인 예시: https://yhcho81.github.io/*
  const firebaseConfig = {
    apiKey: "AIzaSyBIfg2VfGj2hXyfRIOfxdAEfX2Cg9Kx2dE",
    authDomain: "soma-us-tools.firebaseapp.com",
    projectId: "soma-us-tools",
    storageBucket: "soma-us-tools.firebasestorage.app",
    messagingSenderId: "1083840033205",
    appId: "1:1083840033205:web:38da897b2d3ac33baa69fc"
  };

  const app = initializeApp(firebaseConfig);
  const db      = getFirestore(app);
  const storage = getStorage(app);
  const COL = 'sequences';

  // 전역으로 노출
  window._fbSave = async (data) => {
    // 1) Firestore 문서 생성 (docId 획득)
    const docRef = await addDoc(collection(db, COL), {
      title: data.title,
      categories: JSON.stringify(data.categories),
      savedAt: serverTimestamp()
    });
    const docId = docRef.id;

    // 2) imgStore 이미지를 압축 후 Storage에 업로드
    const imgUrls = {};
    if (data.imgStore && Object.keys(data.imgStore).length > 0) {
      await Promise.all(Object.entries(data.imgStore).map(async ([imgId, dataURL]) => {
        try {
          const compressed = await window._compressDataURL(dataURL);
          const storageRef = ref(storage, `sequences/${docId}/${imgId}`);
          await uploadString(storageRef, compressed, 'data_url');
          imgUrls[imgId] = await getDownloadURL(storageRef);
        } catch (e) {
          console.warn('이미지 업로드 실패 (imgId:', imgId, '):', e.message);
        }
      }));
      // 3) imgUrls를 Firestore 문서에 업데이트
      if (Object.keys(imgUrls).length > 0) {
        await updateDoc(docRef, { imgUrls });
      }
    }

    return docId;
  };

  window._fbList = async () => {
    const snap = await getDocs(collection(db, COL));
    return snap.docs.map(d => ({ id: d.id, title: d.data().title, savedAt: d.data().savedAt, raw: d.data() }));
  };

  window._fbDelete = async (id) => {
    // Storage 이미지 먼저 삭제 (실패해도 무시)
    try {
      const snap = await getDoc(doc(db, COL, id));
      if (snap.exists()) {
        const imgUrls = snap.data().imgUrls || {};
        await Promise.allSettled(
          Object.keys(imgUrls).map(imgId =>
            deleteObject(ref(storage, `sequences/${id}/${imgId}`))
          )
        );
      }
    } catch (e) {
      console.warn('Storage 이미지 삭제 실패 (무시):', e.message);
    }
    await deleteDoc(doc(db, COL, id));
  };

  // Firebase 초기화 완료 플래그
  window._fbReady = true;
</script>
</head>
<body>

<!-- ═══════════════════════════════════════════
     에디터 UI
═══════════════════════════════════════════ -->
<div id="editor-ui">
  <h1>SOMA US — Yoga Sequence Editor</h1>
  <p class="subtitle">A4 프린트용 요가 시퀀스 템플릿 편집기 &nbsp;|&nbsp; 타이틀 / 플로우 / 이미지 / 설명을 입력 후 프리뷰·인쇄하세요.</p>

  <!-- 문서 제목 -->
  <div class="section-card">
    <h2>문서 제목</h2>
    <label>전체 문서 타이틀 (인쇄물 상단)</label>
    <input type="text" id="doc-title" value="SOMA US — Yoga Sequence" placeholder="예: SOMA US — Spring Flow Sequence">
  </div>

  <!-- 카테고리 목록 -->
  <div id="categories-container"></div>

  <div class="btn-row" style="margin-bottom: 80px;">
    <button class="btn-primary" onclick="addCategory()">+ 카테고리 추가</button>

  </div>
</div>

<!-- 시트 관리 바 -->
<div id="sheet-bar" style="position:fixed;top:0;left:0;right:0;background:#2A2A2A;color:#E8DBBF;padding:0 12px;z-index:200;font-size:13px;display:flex;align-items:center;gap:8px;min-height:48px;">
  <!-- 시트 탭 영역 -->
  <span style="font-weight:700;color:#7B8C65;white-space:nowrap;font-size:12px;">SHEETS</span>
  <div id="sheet-tab-list" style="display:flex;gap:5px;align-items:center;flex:1;overflow-x:auto;padding:6px 0;"></div>
  <button onclick="addNewSheet()" title="새 시트 추가 (시트 이름 입력)" style="background:#3a3a3a;color:#aaa;border:1px dashed #555;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:16px;line-height:1;flex-shrink:0;">+</button>
  <!-- 구분선 -->
  <div style="width:1px;height:28px;background:#444;flex-shrink:0;margin:0 4px;"></div>
  <!-- 저장/불러오기 -->
  <label id="btn-load" title="저장한 JSON 파일 불러오기" style="background:#3a3a3a;color:#ccc;border:none;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:5px;">
    📂 불러오기
    <input type="file" accept=".json" style="display:none;" onchange="importJSON(event)">
  </label>
  <button id="btn-save" onclick="exportJSON()" title="JSON 파일로 저장 (Ctrl+S)" style="background:#3a3a3a;color:#ccc;border:none;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:5px;">
    💾 JSON
  </button>
  <button onclick="cloudSave()" title="클라우드에 저장" style="background:#7B8C65;color:#fff;border:none;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:5px;">
    ☁️ 저장
  </button>
  <button onclick="cloudLoad()" title="클라우드에서 불러오기" style="background:#4a6fa5;color:#fff;border:none;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:5px;">
    ☁️ 목록
  </button>
  <span id="dirty-indicator" style="font-size:11px;color:#f0a050;white-space:nowrap;flex-shrink:0;display:none;">● 미저장</span>
</div>

<!-- 시트 이름 편집 모달 -->
<div id="sheet-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:500;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:12px;padding:28px 28px 20px;width:340px;box-shadow:0 8px 32px rgba(0,0,0,0.2);">
    <h3 style="font-size:15px;color:#2A2A2A;margin-bottom:16px;" id="sheet-modal-title">새 시트 추가</h3>
    <label style="font-size:12px;color:#888;display:block;margin-bottom:6px;">시트 이름</label>
    <input id="sheet-modal-input" type="text" placeholder="예: 소매틱 이완 요가"
      style="width:100%;border:1px solid #ddd;border-radius:6px;padding:8px 10px;font-size:14px;font-family:inherit;"
      onkeydown="if(event.key==='Enter') confirmSheetModal()">
    <div style="display:flex;gap:8px;margin-top:18px;justify-content:flex-end;">
      <button onclick="closeSheetModal()" style="background:#f0ede8;color:#555;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;">취소</button>
      <button onclick="confirmSheetModal()" style="background:#7B8C65;color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;">확인</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     하단 액션 바
═══════════════════════════════════════════ -->
<div id="action-bar">
  <button class="btn-secondary" onclick="showPreview()">🔍 프리뷰 보기</button>
  <button class="btn-primary" onclick="printDoc()">🖨️ 인쇄 / PDF 저장</button>

<!-- ═══════════════════════════════════════════
     프리뷰 오버레이
═══════════════════════════════════════════ -->
<div id="preview-overlay">
  <button id="preview-close-btn" onclick="closePreview()">✕ 닫기</button>
  <button id="preview-print-btn" onclick="printDoc()">🖨️ 인쇄</button>
  <div id="preview-content"></div>
</div>

<!-- 인쇄 전용 영역 -->
<div id="print-area" style="display:none;"></div>


<script>
// ─────────────────────────────────────────────
// 데이터 모델
// ─────────────────────────────────────────────
let categories = [];
let catIdCounter = 0;
let flowIdCounter = 0;

// 이미지 저장소 (id → dataURL)
const imgStore = {};

function makeCell() {
  return { imgId: null, desc: '' };
}

function makeFlow(catId) {
  flowIdCounter++;
  return {
    id: `f${flowIdCounter}`,
    catId,
    title: '',
    cells: [makeCell(), makeCell(), makeCell(), makeCell(), makeCell()]
  };
}

function addCategory() {
  catIdCounter++;
  const cat = {
    id: `c${catIdCounter}`,
    title: `카테고리 ${catIdCounter}`,
    flows: []
  };
  categories.push(cat);
  cat.flows.push(makeFlow(cat.id));
  renderEditor();
}

function removeCategory(catId) {
  categories = categories.filter(c => c.id !== catId);
  renderEditor();
}

function addFlow(catId) {
  const cat = categories.find(c => c.id === catId);
  if (cat) {
    cat.flows.push(makeFlow(cat.id));
    renderEditor();
  }
}

function removeFlow(catId, flowId) {
  const cat = categories.find(c => c.id === catId);
  if (cat) {
    cat.flows = cat.flows.filter(f => f.id !== flowId);
    renderEditor();
  }
}

// 셀 5개 추가 (한 행 추가)
function addCells(catId, flowId) {
  const flow = getFlow(catId, flowId);
  if (!flow) return;
  for (let i = 0; i < 5; i++) flow.cells.push(makeCell());
  renderEditor();
}

// 셀 5개 제거 (마지막 행 제거, 최소 5개 유지)
function removeCells(catId, flowId) {
  const flow = getFlow(catId, flowId);
  if (!flow || flow.cells.length <= 5) return;
  flow.cells.splice(flow.cells.length - 5, 5);
  renderEditor();
}

// ─────────────────────────────────────────────
// 에디터 렌더링
// ─────────────────────────────────────────────
function renderEditor() {
  markDirty();
  const container = document.getElementById('categories-container');
  container.innerHTML = '';

  categories.forEach((cat, ci) => {
    const catDiv = document.createElement('div');
    catDiv.className = 'section-card category-block';
    catDiv.innerHTML = `
      <div class="category-header-row">
        <div class="category-num">${ci + 1}</div>
        <h2 style="border:none;padding:0;margin:0;flex:1;">카테고리</h2>
        <button class="btn-danger" style="padding:5px 12px;font-size:12px;" onclick="removeCategory('${cat.id}')">삭제</button>
      </div>
      <label>카테고리 타이틀 (회색 헤더 행)</label>
      <input type="text" value="${esc(cat.title)}" placeholder="예: Warm Up / Core Flow / Cool Down"
        oninput="categories.find(c=>c.id==='${cat.id}').title=this.value">
      <div id="flows-${cat.id}" style="margin-top:14px;"></div>
      <div class="btn-row" style="margin-top:10px;">
        <button class="btn-secondary" onclick="addFlow('${cat.id}')">+ 플로우 추가</button>
      </div>
    `;
    container.appendChild(catDiv);

    const flowsDiv = catDiv.querySelector(`#flows-${cat.id}`);
    cat.flows.forEach((flow, fi) => {
      const rowCount = Math.ceil(flow.cells.length / 5);
      const canRemove = flow.cells.length > 5;

      const flowDiv = document.createElement('div');
      flowDiv.className = 'flow-block';
      flowDiv.innerHTML = `
        <div class="flow-block-header">
          <span>FLOW ${fi + 1}</span>
          <input type="text" value="${esc(flow.title)}" placeholder="플로우 타이틀 (예: Sun Salutation A)"
            oninput="getFlow('${cat.id}','${flow.id}').title=this.value">
          <button class="btn-danger" style="padding:4px 10px;font-size:11px;" onclick="removeFlow('${cat.id}','${flow.id}')">삭제</button>
        </div>
        <div style="font-size:11px;color:#999;margin-bottom:8px;">
          현재 <strong>${flow.cells.length}칸</strong> (${rowCount}행 × 5열)
        </div>
        <div id="cells-${flow.id}"></div>
        <div class="btn-row" style="margin-top:8px;">
          <button class="btn-ghost" style="font-size:11px;padding:5px 12px;"
            onclick="addCells('${cat.id}','${flow.id}')">+ 5칸 추가 (1행)</button>
          <button class="btn-ghost" style="font-size:11px;padding:5px 12px;${canRemove ? '' : 'opacity:0.35;pointer-events:none;'}"
            onclick="removeCells('${cat.id}','${flow.id}')">- 5칸 제거 (마지막 행)</button>
        </div>
      `;
      flowsDiv.appendChild(flowDiv);

      const cellsContainer = flowDiv.querySelector(`#cells-${flow.id}`);

      // 5개씩 행으로 나눠 렌더링
      for (let row = 0; row < rowCount; row++) {
        const rowDiv = document.createElement('div');
        rowDiv.style.cssText = 'margin-bottom:10px;';

        if (rowCount > 1) {
          const rowLabel = document.createElement('div');
          rowLabel.style.cssText = 'font-size:10px;font-weight:700;color:#aaa;margin-bottom:5px;letter-spacing:0.04em;';
          rowLabel.textContent = `ROW ${row + 1}`;
          rowDiv.appendChild(rowLabel);
        }

        const grid = document.createElement('div');
        grid.className = 'cells-grid';

        for (let col = 0; col < 5; col++) {
          const ci2 = row * 5 + col;
          if (ci2 >= flow.cells.length) break;
          const cell = flow.cells[ci2];
          const cellDiv = document.createElement('div');
          cellDiv.className = 'cell-editor';
          cellDiv.draggable = true;
          cellDiv.setAttribute('data-cat-id',   cat.id);
          cellDiv.setAttribute('data-flow-id',  flow.id);
          cellDiv.setAttribute('data-cell-idx', ci2);
          const imgSrc = cell.imgId && imgStore[cell.imgId] ? imgStore[cell.imgId] : null;
          cellDiv.innerHTML = `
            <div class="drag-handle" title="드래그하여 순서 변경">⠿⠿</div>
            <span class="cell-label">${ci2 + 1}번</span>
            <div class="img-upload" onclick="triggerImgUpload('${flow.id}',${ci2})">
              ${imgSrc
                ? `<img src="${imgSrc}" alt="">`
                : `<svg width="60" height="60" viewBox="0 0 100 100" style="opacity:0.18;" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="45" fill="none" stroke="#ccc" stroke-width="2"/><text x="50" y="55" text-anchor="middle" font-size="20" fill="#ccc" font-family="Arial">+</text></svg>`
              }
              <input type="file" accept="image/*" onchange="handleImgUpload(this,'${flow.id}',${ci2})">
            </div>
            <textarea placeholder="동작 설명"
              oninput="getFlow('${cat.id}','${flow.id}').cells[${ci2}].desc=this.value">${esc(cell.desc)}</textarea>
          `;
          attachCellDrag(cellDiv);
          grid.appendChild(cellDiv);
        }

        rowDiv.appendChild(grid);
        cellsContainer.appendChild(rowDiv);
      }
    });
  });
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

// ─────────────────────────────────────────────
// 셀 드래그 앤 드롭 (같은 flow 안에서 순서 변경)
// ─────────────────────────────────────────────
let dragSrc = null;  // { catId, flowId, cellIdx }

function attachCellDrag(el) {
  el.addEventListener('dragstart', (e) => {
    dragSrc = {
      catId:   el.getAttribute('data-cat-id'),
      flowId:  el.getAttribute('data-flow-id'),
      cellIdx: parseInt(el.getAttribute('data-cell-idx')),
    };
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    // textarea 드래그 방지
    e.dataTransfer.setData('text/plain', '');
  });

  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    document.querySelectorAll('.cell-editor.drag-over').forEach(d => d.classList.remove('drag-over'));
    dragSrc = null;
  });

  el.addEventListener('dragover', (e) => {
    e.preventDefault();
    if (!dragSrc) return;
    if (el.getAttribute('data-flow-id') !== dragSrc.flowId) return;
    if (parseInt(el.getAttribute('data-cell-idx')) === dragSrc.cellIdx) return;
    document.querySelectorAll('.cell-editor.drag-over').forEach(d => d.classList.remove('drag-over'));
    el.classList.add('drag-over');
    e.dataTransfer.dropEffect = 'move';
  });

  el.addEventListener('dragleave', () => {
    el.classList.remove('drag-over');
  });

  el.addEventListener('drop', (e) => {
    e.preventDefault();
    el.classList.remove('drag-over');
    if (!dragSrc) return;
    const targetIdx = parseInt(el.getAttribute('data-cell-idx'));
    const srcIdx    = dragSrc.cellIdx;
    if (el.getAttribute('data-flow-id') !== dragSrc.flowId) return;
    if (targetIdx === srcIdx) return;

    const flow = getFlow(dragSrc.catId, dragSrc.flowId);
    if (!flow) return;

    // 배열에서 srcIdx 꺼내 targetIdx 위치에 삽입
    const [moved] = flow.cells.splice(srcIdx, 1);
    flow.cells.splice(targetIdx, 0, moved);

    renderEditor();
  });

  // textarea, 이미지 영역 클릭 시 드래그 시작 방지
  el.querySelector('textarea')?.addEventListener('mousedown', (e) => e.stopPropagation());

  // 이미지 영역 — 클릭 드래그 방지 + 파일 드롭 업로드
  const imgUpload = el.querySelector('.img-upload');
  if (imgUpload) {
    imgUpload.addEventListener('mousedown', (e) => e.stopPropagation());

    imgUpload.addEventListener('dragover', (e) => {
      // 파일 드롭인 경우만 허용 (셀 재정렬 드래그와 구분)
      if (e.dataTransfer.types.includes('Files')) {
        e.preventDefault();
        e.stopPropagation();
        imgUpload.style.borderColor = '#7B8C65';
        imgUpload.style.background  = '#f0f4ec';
      }
    });

    imgUpload.addEventListener('dragleave', (e) => {
      e.stopPropagation();
      imgUpload.style.borderColor = '';
      imgUpload.style.background  = '';
    });

    imgUpload.addEventListener('drop', (e) => {
      e.preventDefault();
      e.stopPropagation();
      imgUpload.style.borderColor = '';
      imgUpload.style.background  = '';

      const file = e.dataTransfer.files[0];
      if (!file || !file.type.startsWith('image/')) return;

      const flowId  = el.getAttribute('data-flow-id');
      const cellIdx = parseInt(el.getAttribute('data-cell-idx'));
      const fakeInput = { files: [file] };
      handleImgUpload(fakeInput, flowId, cellIdx);
    });
  }
}

function getFlow(catId, flowId) {
  const cat = categories.find(c => c.id === catId);
  return cat ? cat.flows.find(f => f.id === flowId) : null;
}

function triggerImgUpload(flowId, cellIdx) {
  const cellDiv = document.querySelector(
    `.cell-editor[data-flow-id="${flowId}"][data-cell-idx="${cellIdx}"]`
  );
  if (!cellDiv) return;
  cellDiv.querySelector('input[type="file"]').click();
}

function handleImgUpload(input, flowId, cellIdx) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const dataURL = e.target.result;
    const imgId = `img_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
    imgStore[imgId] = dataURL;
    for (const cat of categories) {
      const flow = cat.flows.find(f => f.id === flowId);
      if (flow && flow.cells[cellIdx]) {
        const oldId = flow.cells[cellIdx].imgId;
        if (oldId && oldId !== imgId) delete imgStore[oldId];
        flow.cells[cellIdx].imgId = imgId;
        break;
      }
    }
    renderEditor();
  };
  reader.readAsDataURL(file);
}

// ─────────────────────────────────────────────
// A4 HTML 생성
// 카테고리별로 테이블 분리 → <thead>가 페이지마다 반복됨
// ─────────────────────────────────────────────
function buildA4HTML() {
  const docTitle = document.getElementById('doc-title').value || 'SOMA US — Yoga Sequence';

  if (!categories.length || categories.every(c => !c.flows.length)) {
    return `<div class="a4-page">
      <div class="seq-doc-title">${escHtml(docTitle)}</div>
      <p style="text-align:center;color:#ccc;font-size:9pt;margin-top:20mm;">카테고리와 플로우를 추가하세요.</p>
    </div>`;
  }

  const colgroup = `<colgroup>
    <col style="width:20%"><col style="width:20%"><col style="width:20%">
    <col style="width:20%"><col style="width:20%">
  </colgroup>`;

  let html = `<div class="a4-page">
    <div class="seq-doc-title">${escHtml(docTitle)}</div>`;

  for (const cat of categories) {
    if (!cat.flows.length) continue;

    // 카테고리 단위로 테이블 생성
    // <thead> 안의 카테고리 헤더 행은 페이지 넘김 시 자동 반복됨
    html += `
    <table class="seq-table" style="margin-bottom:4mm;">
      ${colgroup}
      <thead>
        <tr class="row-category">
          <td colspan="5">${escHtml(cat.title || '(카테고리 없음)')}</td>
        </tr>
      </thead>`;

    // 플로우마다 독립된 <tbody> → break-inside:avoid 가 플로우 단위로 적용됨
    for (const flow of cat.flows) {
      const rowCount = Math.ceil(flow.cells.length / 5);

      for (let row = 0; row < rowCount; row++) {
        html += `<tbody>`;

        // 플로우 타이틀
        if (row === 0) {
          html += `
          <tr class="row-flow-title">
            <td colspan="5">${escHtml(flow.title || '(플로우 타이틀)')}</td>
          </tr>`;
        } else {
          html += `
          <tr class="row-flow-title" style="background:#f3f0ea;">
            <td colspan="5" style="color:#999;font-size:6.5pt;padding:1mm 3mm;font-style:italic;">
              ↳ ${escHtml(flow.title || '')} 계속
            </td>
          </tr>`;
        }

        // 이미지 행
        html += `<tr class="row-images">`;
        for (let col = 0; col < 5; col++) {
          const idx = row * 5 + col;
          const cell = flow.cells[idx];
          if (!cell) { html += `<td style="background:#fafafa;"></td>`; continue; }
          const imgSrc = cell.imgId && imgStore[cell.imgId];
          html += imgSrc
            ? `<td><img src="${imgSrc}" alt=""></td>`
            : `<td><div class="img-placeholder"><svg width="50" height="50" viewBox="0 0 100 100" style="opacity:0.15;" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="45" fill="none" stroke="#ccc" stroke-width="2"/><text x="50" y="55" text-anchor="middle" font-size="20" fill="#ccc" font-family="Arial">+</text></svg></div></td>`;
        }
        html += `</tr>`;

        // 설명 행
        html += `<tr class="row-desc">`;
        for (let col = 0; col < 5; col++) {
          const idx = row * 5 + col;
          const cell = flow.cells[idx];
          html += `<td>${cell ? escHtml(cell.desc || '') : ''}</td>`;
        }
        html += `</tr>`;

        html += `</tbody>`;
      }
    }

    html += `</table>`;
  }

  html += `</div>`;
  return html;
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────
// 프리뷰
// ─────────────────────────────────────────────
function showPreview() {
  const overlay = document.getElementById('preview-overlay');
  document.getElementById('preview-content').innerHTML = buildA4HTML();
  overlay.classList.add('active');
}

function closePreview() {
  document.getElementById('preview-overlay').classList.remove('active');
}

// ─────────────────────────────────────────────
// 인쇄
// ─────────────────────────────────────────────
function printDoc() {
  const printArea = document.getElementById('print-area');
  printArea.innerHTML = buildA4HTML();
  printArea.style.display = 'block';
  document.getElementById('editor-ui').style.display = 'none';
  document.getElementById('action-bar').style.display = 'none';
  const overlay = document.getElementById('preview-overlay');
  const wasActive = overlay.classList.contains('active');
  overlay.classList.remove('active');

  window.print();

  // 인쇄 후 복구
  setTimeout(() => {
    printArea.style.display = 'none';
    document.getElementById('editor-ui').style.display = 'block';
    document.getElementById('action-bar').style.display = 'flex';
    if (wasActive) overlay.classList.add('active');
  }, 500);
}


// ─────────────────────────────────────────────
// 이미지 압축 (Storage 업로드 전 사용)
// maxPx: 최대 가로/세로, quality: JPEG 품질 0~1
// ─────────────────────────────────────────────
window._compressDataURL =
function compressDataURL(dataURL, maxPx = 1200, quality = 0.75) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      if (width > maxPx || height > maxPx) {
        if (width >= height) { height = Math.round(height * maxPx / width); width = maxPx; }
        else { width = Math.round(width * maxPx / height); height = maxPx; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => resolve(dataURL); // 실패 시 원본 유지
    img.src = dataURL;
  });
}

// ─────────────────────────────────────────────
// 현재 시트 데이터 반환
// ─────────────────────────────────────────────
function getCurrentSheetData() {
  return {
    title: document.getElementById('doc-title').value || 'SOMA US — Yoga Sequence',
    categories: JSON.parse(JSON.stringify(categories))
  };
}

// ─────────────────────────────────────────────
// JSON 파일 저장
// ─────────────────────────────────────────────
function exportJSON() {
  const data = {
    title: document.getElementById('doc-title').value || 'SOMA US — Yoga Sequence',
    categories: JSON.parse(JSON.stringify(categories)),
    imgStore: Object.assign({}, imgStore)
  };
  const json = JSON.stringify(data, null, 2);
  const filename = (data.title || 'sequence').replace(/[\\/:*?"<>|]/g, '_') + '.json';
  const blob = new Blob([json], { type: 'application/json' });

  // iOS Safari는 a.download + Blob URL 미지원 → navigator.share 폴백
  if (navigator.share && navigator.canShare) {
    const file = new File([blob], filename, { type: 'application/json' });
    if (navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file], title: filename })
        .catch(() => _exportJSONFallback(blob, filename));
      return;
    }
  }
  _exportJSONFallback(blob, filename);
}

function _exportJSONFallback(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 300);
}

// JSON 파일 불러오기
function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      // 이미지 복원 — 메모리에만 저장
      if (data.imgStore) {
        Object.assign(imgStore, data.imgStore);
      }
      // 단일 시트 형식 { title, categories }
      const title = data.title || file.name.replace('.json','');
      const cats  = data.categories || [];
      // 새 시트로 등록
      const label = title.slice(0, 30);
      registerSheet(label, () => {
        document.getElementById('doc-title').value = title;
        categories = cats;
        catIdCounter += cats.length;
        cats.forEach(c => { flowIdCounter += c.flows.length; });
        renderEditor();
      });
      const newSh = sheetList[sheetList.length - 1];
      switchSheet(newSh.id);
    } catch(err) {
      alert('JSON 파싱 오류: ' + err.message);
    }
    event.target.value = '';
    markClean();
  };
  reader.readAsText(file);
}


// ─────────────────────────────────────────────
// 시트 관리 시스템
// ─────────────────────────────────────────────
let sheetList = [];          // [{id, label, loader}]  loader = function()
let activeSheetId = null;
let sheetCounter = 0;

// 시트 저장소: sheetId → {title, cats}
const sheetStore = {};

function registerSheet(label, loader) {
  // 같은 라벨이 이미 있으면 중복 등록 방지
  if (sheetList.some(s => s.label === label)) return;
  sheetCounter++;
  const id = `sh${sheetCounter}`;
  sheetList.push({ id, label, loader });
  renderSheetBar();
}

function renderSheetBar() {
  const list = document.getElementById('sheet-tab-list');
  list.innerHTML = '';
  sheetList.forEach(sh => {
    const isActive = sh.id === activeSheetId;
    const wrap = document.createElement('div');
    wrap.style.cssText = `display:inline-flex;align-items:center;background:${isActive ? '#7B8C65' : '#3a3a3a'};border-radius:6px;overflow:hidden;`;

    const btn = document.createElement('button');
    btn.textContent = sh.label;
    btn.title = sh.label;
    btn.style.cssText = `background:transparent;color:${isActive ? '#fff' : '#ccc'};border:none;padding:5px 12px;cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap;`;
    btn.onclick = () => switchSheet(sh.id);

    const renameBtn = document.createElement('button');
    renameBtn.textContent = '✎';
    renameBtn.title = '이름 변경';
    renameBtn.style.cssText = `background:transparent;color:${isActive ? '#ddd' : '#666'};border:none;padding:5px 4px 5px 0;cursor:pointer;font-size:11px;`;
    renameBtn.onclick = (e) => { e.stopPropagation(); openRenameSheet(sh.id); };

    const delBtn = document.createElement('button');
    delBtn.textContent = '×';
    delBtn.title = '시트 삭제';
    delBtn.style.cssText = `background:transparent;color:${isActive ? '#fbb' : '#777'};border:none;padding:5px 8px 5px 2px;cursor:pointer;font-size:14px;font-weight:700;`;
    delBtn.onclick = (e) => { e.stopPropagation(); deleteSheet(sh.id); };

    wrap.appendChild(btn);
    wrap.appendChild(renameBtn);
    wrap.appendChild(delBtn);
    list.appendChild(wrap);
  });
}

function switchSheet(sheetId) {
  // 현재 상태 저장
  if (activeSheetId) {
    sheetStore[activeSheetId] = {
      title: document.getElementById('doc-title').value,
      cats: JSON.parse(JSON.stringify(categories)),
      catIdCounter,
      flowIdCounter,
    };
  }

  activeSheetId = sheetId;
  const sh = sheetList.find(s => s.id === sheetId);
  if (!sh) return;

  // 저장된 상태가 있으면 복원, 없으면 loader 실행
  if (sheetStore[sheetId]) {
    const saved = sheetStore[sheetId];
    categories = saved.cats;
    catIdCounter = saved.catIdCounter;
    flowIdCounter = saved.flowIdCounter;
    document.getElementById('doc-title').value = saved.title;
    renderEditor();
  } else {
    sh.loader();
  }

  renderSheetBar();
}

function deleteSheet(sheetId) {
  if (sheetList.length <= 1) { alert('마지막 시트는 삭제할 수 없습니다.'); return; }
  if (!confirm(`"${sheetList.find(s=>s.id===sheetId)?.label}" 시트를 삭제할까요?`)) return;

  const idx = sheetList.findIndex(s => s.id === sheetId);
  sheetList.splice(idx, 1);
  delete sheetStore[sheetId];

  if (activeSheetId === sheetId) {
    activeSheetId = null;
    const next = sheetList[Math.min(idx, sheetList.length - 1)];
    if (next) switchSheet(next.id);
  }
  renderSheetBar();
}

// 새 빈 시트 추가
let modalMode = 'add';   // 'add' | 'rename'
let renameTargetId = null;

function addNewSheet() {
  modalMode = 'add';
  document.getElementById('sheet-modal-title').textContent = '새 시트 추가';
  document.getElementById('sheet-modal-input').value = '';
  document.getElementById('sheet-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('sheet-modal-input').focus(), 50);
}

function openRenameSheet(sheetId) {
  modalMode = 'rename';
  renameTargetId = sheetId;
  const sh = sheetList.find(s => s.id === sheetId);
  document.getElementById('sheet-modal-title').textContent = '시트 이름 변경';
  document.getElementById('sheet-modal-input').value = sh?.label || '';
  document.getElementById('sheet-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('sheet-modal-input').select(), 50);
}

function closeSheetModal() {
  document.getElementById('sheet-modal').style.display = 'none';
}

function confirmSheetModal() {
  const name = document.getElementById('sheet-modal-input').value.trim();
  if (!name) return;
  closeSheetModal();

  if (modalMode === 'rename') {
    const sh = sheetList.find(s => s.id === renameTargetId);
    if (sh) sh.label = name;
    // 저장된 타이틀도 업데이트
    if (sheetStore[renameTargetId]) sheetStore[renameTargetId].title = name;
    if (activeSheetId === renameTargetId) document.getElementById('doc-title').value = name;
    renderSheetBar();
  } else {
    // 빈 시트 생성
    registerSheet(name, () => {
      catIdCounter = 0; flowIdCounter = 0; categories = [];
      document.getElementById('doc-title').value = name;
      addCategory();
    });
    // 마지막 시트로 전환
    const newSh = sheetList[sheetList.length - 1];
    switchSheet(newSh.id);
  }
}

// ─────────────────────────────────────────────
// KIA 시퀀스 데이터 로드
// ─────────────────────────────────────────────
// ─────────────────────────────────────────────
// 미저장 변경 표시
// ─────────────────────────────────────────────
function markDirty() {
  const el = document.getElementById('dirty-indicator');
  if (el) el.style.display = 'inline';
}

function markClean() {
  const el = document.getElementById('dirty-indicator');
  if (el) el.style.display = 'none';
}

// ─────────────────────────────────────────────
// 초기화
// ─────────────────────────────────────────────
document.getElementById('sheet-modal').addEventListener('click', function(e) {
  if (e.target === this) closeSheetModal();
});

// Ctrl+S 단축키 → JSON 저장
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    exportJSON();
  }
});

// ─────────────────────────────────────────────
// 클라우드 저장 / 불러오기
// ─────────────────────────────────────────────
async function cloudSave() {
  if (!window._fbReady || !window._fbSave) { alert('Firebase 초기화 중입니다. 잠시 후 다시 시도해 주세요.'); return; }
  const data = getCurrentSheetData();
  data.imgStore = Object.assign({}, imgStore); // 이미지 포함
  if (!data.title.trim()) { alert('문서 제목을 입력해 주세요.'); return; }
  try {
    const btn = document.querySelector('button[onclick="cloudSave()"]');
    btn.textContent = '저장 중…';
    btn.disabled = true;
    await window._fbSave(data);
    markClean();
    btn.textContent = '☁️ 저장';
    btn.disabled = false;
    alert(`"${data.title}" 저장 완료!`);
  } catch(e) {
    alert('저장 실패: ' + e.message);
    const btn = document.querySelector('button[onclick="cloudSave()"]');
    btn.textContent = '☁️ 저장';
    btn.disabled = false;
  }
}

async function cloudLoad() {
  if (!window._fbReady || !window._fbList) { alert('Firebase 초기화 중입니다. 잠시 후 다시 시도해 주세요.'); return; }
  try {
    const list = await window._fbList();
    showCloudModal(list);
  } catch(e) {
    alert('목록 불러오기 실패: ' + e.message);
  }
}

function showCloudModal(list) {
  let modal = document.getElementById('cloud-modal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'cloud-modal';
    modal.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:600;align-items:center;justify-content:center;';
    modal.innerHTML = `
      <div style="background:#fff;border-radius:12px;padding:28px;width:420px;max-height:70vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,0.2);">
        <h3 style="font-size:15px;color:#2A2A2A;margin-bottom:16px;">☁️ 클라우드 저장 목록</h3>
        <div id="cloud-list" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;min-height:60px;"></div>
        <button onclick="document.getElementById('cloud-modal').style.display='none'"
          style="margin-top:16px;background:#eee;border:none;padding:8px;border-radius:6px;cursor:pointer;font-size:13px;">닫기</button>
      </div>`;
    document.body.appendChild(modal);
  }

  const listEl = modal.querySelector('#cloud-list');
  if (list.length === 0) {
    listEl.innerHTML = '<p style="color:#aaa;font-size:13px;text-align:center;padding:20px 0;">저장된 시퀀스가 없습니다.</p>';
  } else {
    listEl.innerHTML = list.map(item => {
      const date = item.savedAt?.toDate ? item.savedAt.toDate().toLocaleString('ko-KR') : '';
      return `<div style="display:flex;align-items:center;gap:8px;padding:10px 12px;border:1px solid #eee;border-radius:8px;">
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:600;color:#2A2A2A;">${esc(item.title)}</div>
          <div style="font-size:11px;color:#aaa;margin-top:2px;">${date}</div>
        </div>
        <button onclick="cloudLoadItem('${item.id}', ${JSON.stringify(JSON.stringify(item.raw))})"
          style="background:#7B8C65;color:#fff;border:none;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;">불러오기</button>
        <button onclick="cloudDeleteItem('${item.id}', this)"
          style="background:#eee;color:#888;border:none;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;">삭제</button>
      </div>`;
    }).join('');
  }

  modal.style.display = 'flex';
}

async function cloudLoadItem(id, rawJson) {
  try {
    const raw    = JSON.parse(rawJson);
    const title  = raw.title;
    const cats   = JSON.parse(raw.categories);
    const imgUrls = raw.imgUrls || {};
    const label  = title.slice(0, 30);

    // Storage URL → dataURL 변환 후 imgStore 복원
    const restoredImgs = {};
    await Promise.allSettled(
      Object.entries(imgUrls).map(async ([imgId, url]) => {
        try {
          const res  = await fetch(url);
          const blob = await res.blob();
          restoredImgs[imgId] = await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.readAsDataURL(blob);
          });
        } catch (e) {
          console.warn('이미지 복원 실패 (imgId:', imgId, '):', e.message);
        }
      })
    );

    registerSheet(label, () => {
      document.getElementById('doc-title').value = title;
      categories = cats;
      catIdCounter += cats.length;
      cats.forEach(c => { flowIdCounter += c.flows.length; });
      Object.assign(imgStore, restoredImgs);
      renderEditor();
    });
    const newSh = sheetList[sheetList.length - 1];
    switchSheet(newSh.id);
    markClean();
    document.getElementById('cloud-modal').style.display = 'none';
  } catch(e) {
    alert('불러오기 실패: ' + e.message);
  }
}

async function cloudDeleteItem(id, btn) {
  if (!confirm('삭제하시겠습니까?')) return;
  try {
    btn.textContent = '…';
    btn.disabled = true;
    await window._fbDelete(id);
    // 목록 새로고침
    const list = await window._fbList();
    showCloudModal(list);
  } catch(e) {
    alert('삭제 실패: ' + e.message);
  }
}

window.addEventListener('DOMContentLoaded', () => {
  // 빈 시트 하나로 시작
  registerSheet('새 시퀀스', () => {
    catIdCounter = 0; flowIdCounter = 0; categories = [];
    document.getElementById('doc-title').value = 'SOMA US — Yoga Sequence';
    addCategory();
  });
  switchSheet(sheetList[0].id);
  markClean();

  // 문서 제목 변경 시 미저장 표시
  document.getElementById('doc-title').addEventListener('input', markDirty);
});
</script>
